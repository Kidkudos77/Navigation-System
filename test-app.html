<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftRoute Delivery - Test Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-purple-50">
    <div class="container mx-auto p-8 max-w-6xl">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold mb-2">SwiftRoute Delivery</h1>
            <p class="text-gray-600">Navigation System Test Application</p>
            <p class="text-sm text-gray-500 mt-2">Backend API: <span id="api-status" class="font-mono">Checking...</span></p>
        </div>

        <div class="grid md:grid-cols-2 gap-6 mb-6">
            <!-- Test API Form -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-2xl font-semibold mb-4">Test Route API</h2>
                <form id="route-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Origin</label>
                        <input type="text" id="origin" class="w-full px-3 py-2 border rounded-md" 
                               value="Tallahassee, FL" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Destination</label>
                        <input type="text" id="destination" class="w-full px-3 py-2 border rounded-md" 
                               value="Orlando, FL" required>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">
                        Get Route
                    </button>
                </form>
            </div>

            <!-- Results Display -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-2xl font-semibold mb-4">Route Results</h2>
                <div id="results" class="space-y-2">
                    <p class="text-gray-500">Enter origin and destination to get route information.</p>
                </div>
            </div>
        </div>

        <!-- Route Visualization -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-2xl font-semibold mb-4">Route Visualization</h2>
            <canvas id="route-canvas" class="w-full border rounded-lg" style="height: 500px;"></canvas>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        
        // Check API status
        async function checkApiStatus() {
            try {
                const response = await fetch(`${API_BASE}/docs`);
                document.getElementById('api-status').textContent = '✅ Connected';
                document.getElementById('api-status').className = 'font-mono text-green-600';
            } catch (error) {
                document.getElementById('api-status').textContent = '❌ Not Connected';
                document.getElementById('api-status').className = 'font-mono text-red-600';
            }
        }

        // Handle form submission
        document.getElementById('route-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const origin = document.getElementById('origin').value;
            const destination = document.getElementById('destination').value;
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = '<p class="text-blue-600">Loading route...</p>';
            
            try {
                const response = await fetch(`${API_BASE}/api/shortest-path`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ origin, destination })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Display results
                resultsDiv.innerHTML = `
                    <div class="space-y-3">
                        <div>
                            <p class="text-sm text-gray-600">Origin</p>
                            <p class="font-medium">${data.origin || origin}</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-600">Destination</p>
                            <p class="font-medium">${data.destination || destination}</p>
                        </div>
                        ${data.total_distance_m ? `
                        <div>
                            <p class="text-sm text-gray-600">Distance</p>
                            <p class="font-medium">${(data.total_distance_m / 1000).toFixed(2)} km</p>
                        </div>
                        ` : ''}
                        ${data.total_time_s ? `
                        <div>
                            <p class="text-sm text-gray-600">Estimated Time</p>
                            <p class="font-medium">${Math.floor(data.total_time_s / 60)} minutes</p>
                        </div>
                        ` : ''}
                        <div>
                            <p class="text-sm text-gray-600">Route Points</p>
                            <p class="font-medium">${(data.coords || data.shortest_path || []).length} coordinates</p>
                        </div>
                    </div>
                `;
                
                // Draw route on canvas
                if (data.coords || data.shortest_path) {
                    drawRoute(data.coords || data.shortest_path);
                }
            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded p-3">
                        <p class="text-red-600 font-medium">Error</p>
                        <p class="text-sm text-red-500">${error.message}</p>
                        <p class="text-xs text-gray-500 mt-2">Make sure the backend server is running on port 8000</p>
                    </div>
                `;
            }
        });

        // Draw route on canvas
        function drawRoute(coords) {
            const canvas = document.getElementById('route-canvas');
            const ctx = canvas.getContext('2d');
            
            if (!coords || coords.length === 0) {
                ctx.fillStyle = '#999';
                ctx.font = '16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('No route data available', canvas.width / 2, canvas.height / 2);
                return;
            }
            
            // Set canvas size
            canvas.width = canvas.offsetWidth;
            canvas.height = 500;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#e0f2fe');
            gradient.addColorStop(1, '#f0f9ff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Calculate bounding box
            const lats = coords.map(c => Array.isArray(c) ? c[0] : c.lat);
            const lngs = coords.map(c => Array.isArray(c) ? c[1] : c.lng);
            const minLat = Math.min(...lats);
            const maxLat = Math.max(...lats);
            const minLng = Math.min(...lngs);
            const maxLng = Math.max(...lngs);
            
            const latRange = maxLat - minLat || 1;
            const lngRange = maxLng - minLng || 1;
            const padding = 40;
            
            // Project coordinates
            const projected = coords.map(c => {
                const lat = Array.isArray(c) ? c[0] : c.lat;
                const lng = Array.isArray(c) ? c[1] : c.lng;
                const x = padding + ((lng - minLng) / lngRange) * (canvas.width - padding * 2);
                const y = padding + ((maxLat - lat) / latRange) * (canvas.height - padding * 2);
                return { x, y };
            });
            
            // Draw route line
            ctx.strokeStyle = '#2563eb';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.beginPath();
            projected.forEach((p, i) => {
                if (i === 0) ctx.moveTo(p.x, p.y);
                else ctx.lineTo(p.x, p.y);
            });
            ctx.stroke();
            
            // Draw markers
            const start = projected[0];
            const end = projected[projected.length - 1];
            
            // Start marker (green)
            drawMarker(ctx, start.x, start.y, '#22c55e', 'S');
            
            // End marker (red)
            drawMarker(ctx, end.x, end.y, '#ef4444', 'E');
            
            // Labels
            ctx.fillStyle = '#1e293b';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('START', start.x, start.y - 35);
            ctx.fillText('END', end.x, end.y - 35);
        }
        
        function drawMarker(ctx, x, y, color, label) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y - 20, 15, 0, Math.PI * 2);
            ctx.fill();
            
            // Pin point
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - 8, y - 15);
            ctx.lineTo(x + 8, y - 15);
            ctx.closePath();
            ctx.fill();
            
            // White circle
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x, y - 20, 10, 0, Math.PI * 2);
            ctx.fill();
            
            // Label
            ctx.fillStyle = color;
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, x, y - 20);
        }
        
        // Check API status on load
        checkApiStatus();
        setInterval(checkApiStatus, 5000);
    </script>
</body>
</html>
